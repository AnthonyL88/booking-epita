name: security

on:
  workflow_dispatch:
permissions:
  actions: read
  security-events: write
  contents: read

jobs:
  dependencies-analysis:
    name: run osv-scanner
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@c51854704019a247608d928f370c98740469d4b5"
    with:
    scan-args: |-
    --format sarif
    --output DependenciesAnalysisFull.sarif
    ./
    continue-on-error: true

  SourceCodeAnalysis:
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep@sha256:326e5f41cc972bb423b764a14febbb62bbad29ee1c01820805d077dd868fea48

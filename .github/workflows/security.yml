---
name: security
on:
  workflow_dispatch: null
permissions:
  actions: read
  security-events: write
  contents: read
jobs:
  dependencies-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5
        continue-on-error: true
        with:
          scan-args: |-
            --format sarif
            --output DependenciesAnalysisFull.sarif
            ./

      - name : Sarif
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: DependenciesAnalysisFull.sarif
    
  SourceCodeAnalysis:
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep@sha256:326e5f41cc972bb423b764a14febbb62bbad29ee1c01820805d077dd868fea48
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --sarif --output khara.sarif --config .semgrep

      - name: Upload Semgrep
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: khara.sarif
        

